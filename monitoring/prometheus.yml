global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: 'bookstore'
    static_configs:
      - targets:
          - 'frontend:3000'
          - 'api-gateway:3000'
          - 'user-service:3001'
          - 'book-catalog-service:3002'
          - 'order-service:3003'
          - 'payment-service:3004'
          - 'review-service:3005'
          - 'cart-service:3006'
          - 'recommendation-service:3007'
          - 'notification-service:3008'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scheme: http

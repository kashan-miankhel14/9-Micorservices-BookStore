apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: review-service
  template:
    metadata:
      labels:
        app: review-service
    spec:
      containers:
      - name: review-service
        image: bookstore-review-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3005
        env:
        - name: PORT
          value: "3005"
        - name: MONGO_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: MONGO_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bookstore-secret
              key: JWT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3005
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: bookstore
spec:
  type: ClusterIP
  selector:
    app: review-service
  ports:
  - port: 3005
    targetPort: 3005

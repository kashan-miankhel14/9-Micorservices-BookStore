apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
      - name: recommendation-service
        image: bookstore-recommendation-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 4007
        env:
        - name: PORT
          value: "4007"
        envFrom:
        - configMapRef:
            name: bookstore-config
        - secretRef:
            name: bookstore-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4007
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4007
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: bookstore
spec:
  type: ClusterIP
  selector:
    app: recommendation-service
  ports:
  - port: 4007
    targetPort: 4007
    protocol: TCP

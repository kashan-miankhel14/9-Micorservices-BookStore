apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-catalog-service
  namespace: bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: book-catalog-service
  template:
    metadata:
      labels:
        app: book-catalog-service
    spec:
      containers:
      - name: book-catalog-service
        image: bookstore-book-catalog-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        env:
        - name: PORT
          value: "3002"
        - name: MONGO_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: MONGO_URL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: book-catalog-service
  namespace: bookstore
spec:
  type: ClusterIP
  selector:
    app: book-catalog-service
  ports:
  - port: 3002
    targetPort: 3002

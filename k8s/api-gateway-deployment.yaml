apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: bookstore-api-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: USERS_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: USERS_URL
        - name: BOOKS_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: BOOKS_URL
        - name: ORDERS_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: ORDERS_URL
        - name: PAYMENTS_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: PAYMENTS_URL
        - name: REVIEWS_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: REVIEWS_URL
        - name: CART_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: CART_URL
        - name: RECS_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: RECS_URL
        - name: NOTIFY_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: NOTIFY_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bookstore-secret
              key: JWT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: bookstore
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP

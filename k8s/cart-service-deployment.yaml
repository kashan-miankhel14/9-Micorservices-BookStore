apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: bookstore
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
      - name: cart-service
        image: bookstore-cart-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3006
        env:
        - name: PORT
          value: "3006"
        - name: MONGO_URL
          valueFrom:
            configMapKeyRef:
              name: bookstore-config
              key: MONGO_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bookstore-secret
              key: JWT_SECRET
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: bookstore
spec:
  type: ClusterIP
  selector:
    app: cart-service
  ports:
  - port: 3006
    targetPort: 3006
